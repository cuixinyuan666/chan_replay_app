name: Flutter analyze

on:
  push:
    branches:
      - origin_vespa_tdx
  pull_request:
    branches:
      - origin_vespa_tdx

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze Dart
        run: flutter analyze

      - name: Audit Dart algorithm boundary
        run: python tools/audit_dart_algorithm_usage.py

      - name: Check chan.py placement guardrails
        run: python tools/check_chanpy_guardrails.py
